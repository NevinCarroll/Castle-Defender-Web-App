<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defender - Game</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="game-mode" data-user="{{ .User }}">
    <canvas id="gameCanvas" width="1024" height="768"></canvas>
    <div id="stats"></div>
    <div id="controls">
        <button id="btnStandard">Standard Tower (1)</button>
        <button id="btnRapid">Rapid Tower (2)</button>
        <button id="btnSniper">Sniper Tower (3)</button>
        <button id="btnNextWave">Spawn Next Wave</button>
        <div id="waveInfo"></div><br>
        Press 1: Standard Tower<br>
        Press 2: Rapid Tower<br>
        Press 3: Sniper Tower<br>
        Left Click: Place Tower<br>
        Right Click: Cancel Placement<br>
        Esc: Quit Game
    </div>

    <div id="quitModal" class="modal hidden">
        <div class="modal-content">
            <h2>Quit Game</h2>
            <p>Do you want to save before exiting?</p>
            <div class="modal-actions">
                <button id="quitSaveBtn">Save and Exit</button>
                <button id="quitNoSaveBtn">Exit without Saving (Game Over)</button>
                <button id="quitCancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/game.js"></script>
</body>
</html>
