<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defender - Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2f4f4f;
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 3em;
        }
        button {
            font-size: 1.5em;
            padding: 10px 20px;
            margin: 10px;
            background-color: #4682b4;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #5a9bd4;
        }
    </style>
</head>
<body>
    <h1>Castle Defender</h1>
    {{ if .User }}
        <p>Logged in as <strong>{{ .User }}</strong>. <a href="/logout">Logout</a></p>
        <button id="btnStartNew">Start New Game</button>
        <button id="btnContinue" style="display:none">Continue Saved Game</button>
    {{ else }}
        <button onclick="window.location.href='/login'">Login</button>
        <button onclick="window.location.href='/register'">Register</button>
    {{ end }}
    <button onclick="window.location.href='/quit'">Quit</button>
    <script>
        const currentUser = "{{ .User }}";
        const saveKey = `castle_save_${currentUser || 'guest'}`;

        function updateMenuContinueButton() {
            const continueBtn = document.getElementById('btnContinue');
            if (!continueBtn) return;
            const saved = localStorage.getItem(saveKey);
            if (saved) {
                continueBtn.style.display = 'inline-block';
            } else {
                continueBtn.style.display = 'none';
            }
        }

        const startBtn = document.getElementById('btnStartNew');
        if (startBtn) {
            startBtn.addEventListener('click', () => {
                localStorage.removeItem(saveKey);
                window.location.href = '/game';
            });
        }

        const continueBtn = document.getElementById('btnContinue');
        if (continueBtn) {
            continueBtn.addEventListener('click', () => {
                window.location.href = '/game?continue=1';
            });
        }

        updateMenuContinueButton();
        window.addEventListener('storage', updateMenuContinueButton);
    </script>
</body>
</html>
