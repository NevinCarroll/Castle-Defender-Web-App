<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defender - Menu</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Castle Defender</h1>
    {{ if .User }}
        <p>Logged in as <strong>{{ .User }}</strong>. <a href="/logout">Logout</a></p>
        <button id="btnStartNew">Start New Game</button>
        <button id="btnContinue">Continue Saved Game</button>
        <button id="btnTutorial">Tutorial</button>
    {{ else }}
        <button id="btnLogin">Login</button>
        <button id="btnRegister">Register</button>
        <button id="btnTutorial">Tutorial</button>
    {{ end }}
    <script src="/static/menu.js"></script>
</body>
</html>
